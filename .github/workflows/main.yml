name: "vprofile Application"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1" # Hardcoded to be safe if secret isn't set
  ECR_REPOSITORY: vprofileapp
  EKS_CLUSTER: vprofile-eks

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Maven test
        run: mvn -B test

      - name: Maven checkstyle
        run: mvn -B checkstyle:checkstyle

  BUILD_AND_PUBLISH:
    needs: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::541673202339:role/github-actions-role
          role-session-name: GitHub_to_AWS_via_FederatedToken
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:latest \
                       -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  DEPLOY:
    needs: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::541673202339:role/github-actions-role
          role-session-name: GitHub_to_AWS_via_FederatedToken
          aws-region: us-east-1

      - name: Get full EKS cluster name
        id: cluster
        run: |
          NAME=$(aws eks list-clusters --region $AWS_REGION \
                   --query "clusters[?starts_with(@, '$EKS_CLUSTER')] | [0]" \
                   --output text)
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name ${{ steps.cluster.outputs.name }}

      - name: Login to Amazon ECR
        id: ecr-login-deploy
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR pull secret in Kubernetes
        run: |
          kubectl delete secret regcred --ignore-not-found
          kubectl create secret docker-registry regcred \
            --docker-server=${{ steps.ecr-login-deploy.outputs.registry }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region $AWS_REGION)

      - name: Deploy with Helm
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.10
        with:
          aws-region: us-east-1
          cluster-name: ${{ steps.cluster.outputs.name }}
          chart-path: helm/vprofilecharts
          namespace: default
          name: vprofile-stack
          values: appimage=${{ steps.ecr-login-deploy.outputs.registry }}/vprofileapp,apptag=${{ github.run_number }}
          
      - name: Print app URL
        if: success()
        run: |
          echo "Waiting for load balancer..."
          sleep 60
          kubectl get ingress -A